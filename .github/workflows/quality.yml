name: 品質検査

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-quality:
    name: backend-quality (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12", enable-cache: true }
      - run: uv sync --locked --all-groups
      - run: uv run ruff check backend tests scripts/export-openapi.py
      - run: uv run ruff format --check backend tests scripts/export-openapi.py
      - run: uv run mypy backend --no-sqlite-cache
      - run: uv run pytest --cov=backend --cov-report=term-missing --cov-report=xml:reports/coverage/backend.xml --cov-report=html:reports/coverage/backend-html
      - name: 変更行coverage
        if: github.event_name == 'pull_request'
        run: uv run diff-cover reports/coverage/backend.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=85
      - run: uv run pip-audit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: reports/coverage/

  backend-windows:
    name: Backend Windows互換
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12", enable-cache: true }
      - run: uv sync --locked --all-groups
      - run: uv run pytest tests/test_assets.py tests/test_typesetting.py tests/test_rendering.py tests/test_preflight.py tests/test_overlay.py

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12", enable-cache: true }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: uv sync --locked --all-groups
      - run: npm ci
        working-directory: frontend
      - run: uv run python scripts/export-openapi.py frontend/src/api/openapi.json
      - run: npm run api:generate
        working-directory: frontend
      - run: git diff --exit-code -- frontend/src/api/
      - run: npm run check
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: reports/coverage/frontend/

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { python-version: "3.12", enable-cache: true }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: uv sync --locked --all-groups
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
        env:
          IMAGE_BACKEND: stub
          DATABASE_URL: sqlite:///data/e2e.db
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure
          path: |
            frontend/playwright-report/
            frontend/test-results/
