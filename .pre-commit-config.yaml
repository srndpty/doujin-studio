repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
      - id: frontend-check
        name: Frontend check
        entry: npm --prefix frontend run check
        language: system
        pass_filenames: false
